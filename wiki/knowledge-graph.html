会民生","in_degree":7},{"label":"文旅深度报告","category":"06-文化旅游","in_degree":6},{"label":"生态文明建设报告","category":"09-政策与治理","in_degree":5},{"label":"教育深度","category":"10-社会民生","in_degree":5},{"label":"教育深度报告","category":"10-社会民生","in_degree":5},{"label":"非遗与传统文化","category":"04-人口与民族","in_degree":4},{"label":"十五五规划","category":"09-政策与治理","in_degree":4},{"label":"文山市教育医疗","category":"10-社会民生","in_degree":4}]}};

// --- Build legend ---
const legendDiv = document.getElementById('legend-items');
const uniqCats = [...new Set(data.nodes.map(n => n.category))].sort();
uniqCats.forEach(cat => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${CAT_COLORS[cat]||'#888'}"></span>${CAT_LABELS[cat]||cat}`;
  legendDiv.appendChild(item);
});

// --- D3 Force Graph ---
const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select('#graph').append('svg')
  .attr('viewBox', [0,0,width,height])
  .call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', (e) => {
    g.attr('transform', e.transform);
  }));

const g = svg.append('g');

// Tooltip
const tooltip = d3.select('#tooltip');

// Build adjacency for highlighting
const adjacency = {};
data.edges.forEach(e => {
  if (!adjacency[e.source]) adjacency[e.source] = new Set();
  if (!adjacency[e.target]) adjacency[e.target] = new Set();
  adjacency[e.source].add(e.target);
  adjacency[e.target].add(e.source);
});

// Build reference lists for detail panel
const refMap = {};
data.edges.forEach(e => {
  const sn = data.nodes[e.source];
  const tn = data.nodes[e.target];
  if (!refMap[e.source]) refMap[e.source] = [];
  if (!refMap[e.target]) refMap[e.target] = [];
  refMap[e.source].push(tn);
  refMap[e.target].push(sn);
});

// Node size: base 5 + in_degree * 1.5, max 20
const maxDeg = Math.max(...data.nodes.map(n => n.in_degree), 1);
const nodeScale = d3.scaleSqrt().domain([0, maxDeg]).range([5, 22]);

// Links
const link = g.append('g')
  .selectAll('line')
  .data(data.edges)
  .join('line')
  .attr('stroke', 'rgba(255,255,255,0.08)')
  .attr('stroke-width', 0.8);

// Nodes
const node = g.append('g')
  .selectAll('g')
  .data(data.nodes)
  .join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (ev,d) => { if(!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', (ev,d) => { d.fx=ev.x; d.fy=ev.y; })
    .on('end', (ev,d) => { if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
  );

node.append('circle')
  .attr('r', d => nodeScale(d.in_degree))
  .attr('fill', d => CAT_COLORS[d.category] || '#888')
  .attr('stroke', 'rgba(255,255,255,0.3)')
  .attr('stroke-width', 1.5)
  .attr('cursor', 'pointer')
  .on('mouseover', function(ev, d) {
    const neighbors = adjacency[d.id] || new Set();
    node.selectAll('circle').attr('opacity', n => neighbors.has(n.id) || n.id===d.id ? 1 : 0.15);
    link.attr('stroke-opacity', e => (e.source.id===d.id||e.target.id===d.id) ? 0.8 : 0.03);
    link.attr('stroke-width', e => (e.source.id===d.id||e.target.id===d.id) ? 2 : 0.5);
    tooltip.style('display','block')
      .html(`<b>${d.label}</b><br>${CAT_LABELS[d.category]||d.category} · 入度${d.in_degree}`)
      .style('left',(ev.pageX+12)+'px').style('top',(ev.pageY-28)+'px');
  })
  .on('mouseout', function() {
    node.selectAll('circle').attr('opacity', 1);
    link.attr('stroke-opacity', 1).attr('stroke-width', 0.8);
    tooltip.style('display','none');
  })
  .on('click', function(ev, d) { showDetail(d); ev.stopPropagation(); });

node.append('text')
  .text(d => d.label.length > 8 ? d.label.slice(0,8)+'…' : d.label)
  .attr('dy', d => nodeScale(d.in_degree) + 12)
  .attr('text-anchor', 'middle')
  .attr('fill', '#ccc')
  .attr('font-size', '10px')
  .attr('pointer-events', 'none');

// Force simulation
const sim = d3.forceSimulation(data.nodes)
  .force('link', d3.forceLink(data.edges).id(d => d.id).distance(120))
  .force('charge', d3.forceManyBody().strength(-300))
  .force('center', d3.forceCenter(width/2, height/2))
  .force('collision', d3.forceCollide().radius(d => nodeScale(d.in_degree)+8))
  .on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

// --- Click background to close detail ---
svg.on('click', () => { document.getElementById('detail').style.display='none'; });

// --- Detail Panel ---
function showDetail(d) {
  const panel = document.getElementById('detail');
  document.getElementById('detail-title').textContent = d.label;
  document.getElementById('detail-cat').textContent = CAT_LABELS[d.category] || d.category;
  document.getElementById('detail-path').textContent = d.path;
  document.getElementById('detail-indeg').textContent = d.in_degree;
  
  const tagsDiv = document.getElementById('detail-tags');
  tagsDiv.innerHTML = d.tags.map(t => `<span class="tag">${t}</span>`).join('');
  
  const refsDiv = document.getElementById('detail-refs');
  const refs = refMap[d.id] || [];
  refsDiv.innerHTML = refs.map(r => 
    `<div class="ref-item" data-nid="${r.id}">${r.label} (${CAT_LABELS[r.category]||r.category})</div>`
  ).join('');
  
  refsDiv.querySelectorAll('.ref-item').forEach(el => {
    el.addEventListener('click', function() {
      const nid = +this.dataset.nid;
      const target = data.nodes.find(n => n.id === nid);
      if (target) showDetail(target);
    });
  });
  
  panel.style.display = 'block';
}

// --- Search ---
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  const resultsDiv = document.getElementById('search-results');
  
  if (!q) {
    resultsDiv.textContent = '';
    node.selectAll('circle').attr('opacity', 1);
    link.attr('stroke-opacity', 1);
    return;
  }
  
  const matches = data.nodes.filter(n => 
    n.label.toLowerCase().includes(q) || 
    n.tags.some(t => t.toLowerCase().includes(q))
  );
  
  resultsDiv.textContent = `匹配 ${matches.length} 个节点`;
  
  const matchIds = new Set(matches.map(n => n.id));
  node.selectAll('circle').attr('opacity', n => matchIds.has(n.id) ? 1 : 0.1);
  link.attr('stroke-opacity', 0.05);
});

// --- Stats ---
document.getElementById('stat-nodes').textContent = data.stats.nodes;
document.getElementById('stat-edges').textContent = data.stats.edges;
document.getElementById('stat-avg').textContent = data.stats.avg_degree;

// --- Responsive ---
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  svg.attr('viewBox', [0,0,w,h]);
  sim.force('center', d3.forceCenter(w/2, h/2)).restart();
});
</script>
</body>
