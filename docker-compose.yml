services:
  # ── PostgreSQL 16 + pgvector ──
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: wenshan_kb
      POSTGRES_USER: kb_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kb_pass}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./blueprint/mvp/db_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_user -d wenshan_kb"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── FastAPI 后端 ──
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://kb_user:kb_pass@db:5432/wenshan_kb}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql://kb_user:kb_pass@db:5432/wenshan_kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      AGENT_API_KEY: ${AGENT_API_KEY:-wskb-dev-key}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    volumes:
      - .:/data/markdown:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Celery Worker ──
  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: celery -A app.worker.app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://kb_user:kb_pass@db:5432/wenshan_kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Celery Beat 定时调度 ──
  beat:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: celery -A app.worker.app beat --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://kb_user:kb_pass@db:5432/wenshan_kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Next.js 前端 ──
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # ── Nginx 反向代理 ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
